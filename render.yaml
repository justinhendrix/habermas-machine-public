databases:
  - name: habermas-db
    plan: basic_256mb
    region: oregon
    postgresMajorVersion: 16
    databaseName: habermas
    user: habermas_user

services:
  - type: web
    name: habermas-machine
    runtime: node
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habermas-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INSTRUCTOR_SECRET
        sync: false
      - key: NODE_ENV
        value: production
